services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic_secret
      POSTGRES_DB: clinic_saas
    ports:
      # Use 5433 on host if another Postgres already uses 5432 (common on dev machines).
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic -d clinic_saas"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://clinic:clinic_secret@postgres:5432/clinic_saas?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret-min-32-chars-long-xxxxxxxx}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret-min-32-chars-long-xxxxxx}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:-change-me-admin-registration-secret}
      COOKIE_SECURE: "false"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
